spring.application.name=practica-jpa
# Configuracion de la base de datos H2 en memoria
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:file:./notis
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
spring.jpa.hibernate.ddl-auto=update
# Mostrar las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Habilitar la consola web de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Configuracion para generar el script SQL de creacion de la base de datos
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=esquema.sql
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=create
